<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — TAT Portal</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#eef1f7;min-height:100vh}
    .header{background:linear-gradient(90deg,#002366 0%,#0047ab 100%);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px}
    .header-logo{width:60px;height:60px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .header-text h1{font-size:20px;font-weight:bold}
    .header-text h2{font-size:12px;font-weight:normal;opacity:.85;margin-top:2px}
    .navbar{background:#1a1f36;display:flex;align-items:stretch;flex-wrap:wrap}
    .navbar a{color:#b0b8d4;text-decoration:none;padding:11px 18px;font-size:12.5px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid #2a3150;display:flex;align-items:center;gap:5px}
    .navbar a:hover{background:#002366;color:#fff}
    .navbar a.active{background:#003087;color:#fff}
    .navbar .nav-right{margin-left:auto;display:flex;align-items:stretch}
    .navbar .nav-welcome{color:#7eb3ff;padding:11px 16px;font-size:12px;display:flex;align-items:center;border-right:1px solid #2a3150}
    .navbar .nav-logout{color:#ff6b6b;padding:11px 16px;font-size:12px;font-weight:bold;cursor:pointer;text-transform:uppercase;display:flex;align-items:center}
    .navbar .nav-logout:hover{background:#3d0000;color:#ff9999}
    .container{max-width:500px;margin:40px auto;padding:0 15px}
    .card{background:#fff;border:1px solid #c8d3f0;border-radius:6px;overflow:hidden}
    .card-title{background:#002366;color:#fff;padding:12px 20px;font-size:15px;font-weight:bold;display:flex;align-items:center;gap:8px}
    .card-body{padding:28px}
    .field{margin-bottom:20px}
    .field label{display:block;font-size:13px;font-weight:bold;color:#002366;margin-bottom:6px}
    .field input{width:100%;padding:10px 14px;border:1.5px solid #c8d3f0;border-radius:4px;font-size:14px;color:#1a1a1a}
    .field input:focus{outline:none;border-color:#002366;box-shadow:0 0 0 3px rgba(0,35,102,.1)}
    .btn{width:100%;padding:12px;background:#002366;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:.5px}
    .btn:hover{background:#003087}
    .msg{padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;display:none}
    .msg-success{background:#dcfce7;color:#15803d;border:1px solid #86efac}
    .msg-error{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
    footer{text-align:center;padding:14px;background:#1a1f36;color:#6b7294;font-size:12px;margin-top:30px}
  </style>
</head>
<body>
<div class="header">
  <div class="header-logo">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Ccircle cx='30' cy='30' r='28' fill='%23002366'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='22' fill='white' font-weight='bold'%3ETAT%3C/text%3E%3C/svg%3E" alt="TAT"/>
  </div>
  <div class="header-text">
    <h1>Trident Academy of Technology</h1>
    <h2>E-GOVERNANCE PORTAL — CHANGE PASSWORD</h2>
  </div>
</div>
<nav class="navbar">
  <a href="dashboard.html">🏠 Home</a>
  <a href="attendance.html">📋 Attendance Details</a>
  <a href="changepassword.html" class="active">🔑 Change Password</a>
  <div class="nav-right">
    <span class="nav-welcome" id="nav-name">Welcome, Student</span>
    <span class="nav-logout" onclick="logout()">⏻ Logout</span>
  </div>
</nav>
<div class="container">
  <div class="card">
    <div class="card-title">🔑 Change Password</div>
    <div class="card-body">
      <div class="msg msg-success" id="msg-success">✅ Password changed successfully!</div>
      <div class="msg msg-error" id="msg-error"></div>
      <div class="field">
        <label>Enter Current Password</label>
        <input type="password" id="cur-pass" placeholder="Current password"/>
      </div>
      <div class="field">
        <label>Enter New Password</label>
        <input type="password" id="new-pass" placeholder="New password (min 6 chars)"/>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="con-pass" placeholder="Confirm new password"/>
      </div>
      <button class="btn" onclick="changePassword()">Change Password</button>
    </div>
  </div>
</div>
<footer>Copyright © 2024–2025 Trident Academy of Technology. All Rights Reserved.</footer>
<script>
  const API = 'http://localhost:3000';
  const raw = localStorage.getItem('user');
  if (!raw) { location.href = 'index.html'; }
  const user = JSON.parse(raw);
  const sid  = (user.data || {}).student_id || (user.data || {}).studentId || '';
  document.getElementById('nav-name').textContent = 'Welcome, ' + (user.name || 'Student');

  async function changePassword() {
    const cur = document.getElementById('cur-pass').value.trim();
    const np  = document.getElementById('new-pass').value.trim();
    const cp  = document.getElementById('con-pass').value.trim();
    const err = document.getElementById('msg-error');
    const ok  = document.getElementById('msg-success');
    err.style.display = 'none'; ok.style.display = 'none';

    if (!cur || !np || !cp) { err.textContent = 'All fields are required.'; err.style.display = 'block'; return; }
    if (np.length < 6)      { err.textContent = 'New password must be at least 6 characters.'; err.style.display = 'block'; return; }
    if (np !== cp)          { err.textContent = 'New passwords do not match.'; err.style.display = 'block'; return; }

    try {
      const res  = await fetch(`${API}/api/students/${sid}/password`, {
        method : 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ currentPassword: cur, newPassword: np })
      });
      const data = await res.json();
      if (data.success) {
        ok.style.display = 'block';
        document.getElementById('cur-pass').value = '';
        document.getElementById('new-pass').value = '';
        document.getElementById('con-pass').value = '';
      } else {
        err.textContent = data.message || 'Failed to change password.';
        err.style.display = 'block';
      }
    } catch(e) {
      err.textContent = 'Cannot connect to server.';
      err.style.display = 'block';
    }
  }
  function logout() { localStorage.removeItem('user'); location.href = 'index.html'; }
</script>
</body>
</html>
